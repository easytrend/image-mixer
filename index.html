<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Mixer — Meteora x LP Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Pacifico&family=Lobster&family=Caveat&family=Satisfy&family=Great+Vibes&family=Shadows+Into+Light&family=Cookie&family=Sacramento&family=Kaushan+Script&family=Permanent+Marker&family=Amatic+SC&family=Gloria+Hallelujah&family=Special+Elite&family=Indie+Flower&family=Homemade+Apple&family=Allura&family=Alex+Brush&family=Pinyon+Script&family=Tangerine&family=Yellowtail&family=Parisienne&family=Niconne&family=Norican&family=Vibur&family=WindSong&family=Waterfall&family=Roboto&family=Open+Sans&family=Montserrat&family=Oswald&family=Raleway&family=Nunito&family=Poppins&family=Work+Sans&family=Bebas+Neue&family=Anton&family=Russo+One&family=Orbitron&family=Playfair+Display&family=Lora&family=Cormorant+Garamond&family=Cinzel&family=Merriweather&family=EB+Garamond&family=Abril+Fatface&family=Josefin+Sans&family=Comfortaa&family=Exo+2&family=Rajdhani&family=Teko&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#07070e;color:#e0e0e0;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;background:#0f0f14}
#topnav{display:flex;align-items:center;padding:0 14px;height:42px;background:#13131a;border-bottom:1px solid #1e1e2e;flex-shrink:0;gap:12px}
#nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none}
#nav-logo-img{width:22px;height:22px;object-fit:contain}
#nav-logo span{font-size:14px;font-weight:700;color:#fff;letter-spacing:.3px}
#nav-lparmy{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#fff;text-decoration:none;padding:4px 10px;border-radius:6px;background:linear-gradient(135deg,#ff6b2b,#ff4500);border:none}
#nav-lparmy:hover{opacity:.88}
#nav-lparmy-img{width:15px;height:15px;object-fit:contain;border-radius:2px}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:172px;border-right:1px solid #1e1e2e;display:flex;flex-direction:column;background:#0f0f14;flex-shrink:0}
#sidebar-header{padding:8px 10px;border-bottom:1px solid #1e1e2e;background:#0d0d12;font-size:12px;font-weight:600;color:#e0e0e0}
.side-btn{margin:6px 9px 0;padding:7px;font-size:11px;cursor:pointer;border-radius:6px;text-align:center;transition:background .15s}
#upload-btn{border:.5px dashed #444;background:#161620;color:#777}
#upload-btn:hover{background:#1c1c28;color:#bbb}
#sig-btn{border:.5px solid #2a4a2a;background:#0d1a0d;color:#4acc4a;margin-bottom:6px}
#sig-btn:hover{background:#102010}
#file-input,#bg-img-input{display:none}
#layers-lbl{padding:3px 10px 2px;font-size:9px;font-weight:600;color:#444;letter-spacing:.07em;text-transform:uppercase}
#layers-list{flex:1;overflow-y:auto;padding:3px 6px}
#layers-list::-webkit-scrollbar{width:3px}
#layers-list::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
.layer-item{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:5px;cursor:pointer;color:#666;border:.5px solid transparent;margin-bottom:2px;background:#161620}
.layer-item:hover{border-color:#2a2a3a;color:#aaa}
.layer-item.selected{border-color:#3a3a5a;color:#ddd;background:#1c1c2e}
.layer-item.hero-layer{border-color:#1a3a6a;background:#0d1825}
.layer-thumb{width:22px;height:22px;object-fit:cover;border-radius:2px;flex-shrink:0}
.layer-txt-thumb,.layer-sig-thumb{width:22px;height:22px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.layer-txt-thumb{background:#1e1e2e;color:#778}
.layer-sig-thumb{background:#0d1a0d;color:#4acc4a}
.layer-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.layer-vis{cursor:pointer;font-size:11px;opacity:.4;flex-shrink:0}
.layer-vis:hover{opacity:1}
.layer-del{cursor:pointer;font-size:11px;opacity:.25;color:#ff5555;flex-shrink:0}
.layer-del:hover{opacity:1}
.hero-badge{font-size:7px;background:#0d2040;color:#4a8add;border-radius:2px;padding:1px 3px;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#toolbar{display:flex;align-items:center;gap:3px;padding:5px 8px;border-bottom:1px solid #1e1e2e;flex-wrap:wrap;background:#0d0d12}
.tb-btn{font-size:10px;padding:3px 7px;cursor:pointer;border-radius:4px;border:.5px solid #2a2a3a;background:#161620;color:#ffffff;font-weight:700;height:20px;white-space:nowrap}
.tb-btn:hover{background:#1c1c2e;color:#fff}
.tb-btn:disabled{opacity:.2;cursor:not-allowed}
.tb-btn.icon-btn{padding:3px 6px}
.tb-label{font-size:10px;color:#fff;font-weight:700}
#tb-opacity{width:46px;accent-color:#ff6b2b}
#tb-blend{font-size:10px;padding:2px 4px;border-radius:4px;border:.5px solid #2a2a3a;background:#161620;color:#ffffff;font-weight:700;height:20px}
.tb-sep{width:.5px;height:14px;background:#1e1e2e;margin:0 2px;flex-shrink:0}
#history-ind{font-size:9px;color:#fff;font-weight:700;padding:1px 5px;border-radius:2px;background:#161620;border:.5px solid #1e1e2e}
#txt-bar{display:none;align-items:center;gap:3px;padding:3px 8px;border-bottom:1px solid #1e1e2e;flex-wrap:wrap;background:#0a0a12}
#txt-bar.show{display:flex}
.txt-select{font-size:9px;padding:1px 3px;border-radius:4px;border:.5px solid #2a2a3a;background:#161620;color:#ffffff;font-weight:700;height:18px}
.txt-color-inp{width:18px;height:18px;border:.5px solid #333;border-radius:3px;cursor:pointer;padding:0}
.txt-btn{font-size:10px;padding:1px 5px;cursor:pointer;border-radius:4px;border:.5px solid #2a2a3a;background:#161620;color:#ffffff;font-weight:700;height:18px}
.txt-btn:hover{background:#1c1c2e;color:#fff}
.txt-btn.on{background:#1a2a1a;color:#4acc4a;border-color:#1a4a1a}
.txt-hint{font-size:9px;color:#888;font-weight:700;margin-left:3px}
#sz-bar{display:flex;align-items:center;gap:3px;padding:1px 8px;height:18px;background:#0a0a10;border-bottom:1px solid #1a1a26}
#sz-empty{font-size:9px;color:#666;font-weight:700}
#sz-ctl{display:none;align-items:center;gap:2px;width:100%}
.szl{font-size:8px;color:#fff;font-weight:700}
.szi{width:36px;font-size:8px;padding:0 2px;border-radius:2px;border:.5px solid #222;background:#111;color:#fff;font-weight:700;text-align:center;height:14px}
.szi:focus{outline:none;border-color:#ff6b2b}
.szp{font-size:7px;padding:0 3px;border-radius:6px;background:#161620;color:#555;border:.5px solid #222}
.szlk{display:flex;align-items:center;gap:1px;padding:0 3px;height:14px;border-radius:2px;border:.5px solid #222;background:#111;color:#444;cursor:pointer;font-size:7px}
.szlk.on{background:#0a1525;color:#4a8acc}
.szn{font-size:7px;color:#2a2a3a;white-space:nowrap}
#canvas-wrap{flex:1;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;background:#07070e}
#canvas{position:relative;overflow:hidden;background:#fff;flex-shrink:0}
/* Grid overlay */
#grid-overlay{position:absolute;inset:0;pointer-events:none;z-index:998}
.grid-line-h,.grid-line-v{position:absolute;background:rgba(100,160,255,0.18)}
.grid-line-h{left:0;right:0;height:1px}
.grid-line-v{top:0;bottom:0;width:1px}
.grid-label-h,.grid-label-v{position:absolute;font-size:7px;color:rgba(100,160,255,0.55);font-weight:700;pointer-events:none;background:rgba(0,0,0,0.25);padding:0 2px;border-radius:2px;line-height:1.4}
.grid-label-h{left:2px}
.grid-label-v{bottom:2px;transform:translateX(-50%)}
/* Snap lines (red alignment guides) */
.snap-line{position:absolute;background:rgba(255,80,80,0.7);pointer-events:none;z-index:999}
.snap-line.h{left:0;right:0;height:1px}
.snap-line.v{top:0;bottom:0;width:1px}
/* Grid toggle button */
#grid-btn{font-size:10px;padding:3px 7px;cursor:pointer;border-radius:4px;border:.5px solid #2a2a3a;background:#161620;color:#ffffff;font-weight:700;height:20px}
#grid-btn.on{background:#0d1a2a;color:#4a9edd;border-color:#1a3a5a}
.hero-ring{position:absolute;border:2px dashed rgba(255,107,43,.4);border-radius:4px;pointer-events:none;z-index:1000;display:flex;align-items:center;justify-content:center}
.hero-lbl{font-size:9px;color:rgba(255,107,43,.8);background:rgba(0,0,0,.6);padding:1px 5px;border-radius:2px}
.c-node{position:absolute;user-select:none;touch-action:none;cursor:grab}
.c-node:active{cursor:grabbing}
.c-node.selected .node-frame{outline:2px solid #ff6b2b}
.c-node.txt-selected .node-frame{outline:2px solid #4a9edd}
.node-frame{position:relative;width:100%;height:100%}
.node-frame img{width:100%;height:100%;display:block;pointer-events:none}
.txt-display{position:absolute;inset:0;pointer-events:none;overflow:hidden;padding:3px;word-break:break-word;white-space:pre-wrap}
.txt-editor{position:absolute;inset:0;opacity:0;pointer-events:none;resize:none;border:none;outline:none;background:transparent;padding:3px;word-break:break-word;overflow:hidden;z-index:5;font-size:inherit}
.txt-editor.active{opacity:1;pointer-events:auto;cursor:text}
.handle{position:absolute;width:10px;height:10px;background:#ff6b2b;border-radius:50%;z-index:10;border:2px solid #07070e}
.handle.nw{top:-5px;left:-5px;cursor:nw-resize}
.handle.ne{top:-5px;right:-5px;cursor:ne-resize}
.handle.sw{bottom:-5px;left:-5px;cursor:sw-resize}
.handle.se{bottom:-5px;right:-5px;cursor:se-resize}
.handle.txt-se{background:#4a9edd;cursor:se-resize;bottom:-5px;right:-5px}
.rot-handle{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;z-index:10;cursor:crosshair}
.rot-handle.img-rot{background:#0f0f14;border:2px solid #ff6b2b}
.rot-handle.txt-rot{background:#0f0f14;border:2px solid #4a9edd}
.size-tag{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);background:#161620;color:#666;font-size:7px;padding:1px 3px;border-radius:2px;white-space:nowrap;pointer-events:none;border:.5px solid #2a2a3a;z-index:20;display:none}
.c-node.selected .size-tag{display:block}
#bottom-bar{display:flex;flex-direction:column;gap:5px;padding:6px 10px;border-top:1px solid #1e1e2e;background:#0d0d12;flex-shrink:0}
.bb-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bb-lbl{font-size:10px;color:#fff;font-weight:700}
#bg-color{width:22px;height:22px;border:.5px solid #2a2a3a;border-radius:3px;cursor:pointer;padding:0}
#bg-pattern,#fmt-sel,#res-sel,#quality-sel{font-size:10px;padding:2px 4px;border-radius:4px;border:.5px solid #2a2a3a;background:#161620;color:#ffffff;font-weight:700;height:20px}
#bg-img-btn{font-size:10px;padding:2px 8px;cursor:pointer;border-radius:4px;border:.5px solid #333;background:#161620;color:#ffffff;font-weight:700;height:20px}
#bg-img-btn:hover{background:#222;color:#fff}
#save-btn{font-size:11px;padding:4px 14px;cursor:pointer;border-radius:5px;border:1px solid #ff6b2b55;background:#1e0d05;color:#ff6b2b;font-weight:600;white-space:nowrap}
#save-btn:hover{background:#ff6b2b;color:#fff}
#empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:0}
#empty-hint p{font-size:13px;color:#333}
#empty-hint .big{font-size:28px;margin-bottom:6px;color:#2a2a3a}
#sig-modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:center;justify-content:center}
#sig-modal-wrap.open{display:flex}
#sig-modal{background:#13131a;border:1px solid #2a2a3a;border-radius:10px;padding:16px;width:330px;display:flex;flex-direction:column;gap:10px}
#sig-modal-title{font-size:13px;font-weight:600;color:#e0e0e0}
#sig-canvas{background:#fff;border-radius:6px;border:1px solid #333;cursor:crosshair;touch-action:none;display:block;width:100%}
#sig-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sig-tb{font-size:10px;padding:4px 10px;cursor:pointer;border-radius:4px;border:.5px solid #333;background:#1e1e2e;color:#aaa}
.sig-tb:hover{background:#2a2a3a;color:#fff}
#sig-color{width:24px;height:24px;border:.5px solid #333;border-radius:3px;cursor:pointer;padding:0}
#sig-size{width:70px;accent-color:#4a8acc}
#sig-actions{display:flex;gap:8px}
#sig-add{font-size:11px;padding:6px 16px;cursor:pointer;border-radius:6px;background:#0d1a0d;color:#4acc4a;font-weight:600;flex:1;border:.5px solid #2a4a2a}
#sig-add:hover{background:#4acc4a;color:#000}
#sig-cancel{font-size:11px;padding:6px 16px;cursor:pointer;border-radius:6px;border:.5px solid #333;background:#1e1e2e;color:#aaa}
#sig-cancel:hover{background:#2a2a3a}

/* ── Mobile responsive ── */
@media(max-width:600px){
  /* Allow full-page vertical scrolling on mobile */
  body{overflow-y:auto;overflow-x:hidden}
  #app{height:auto;min-height:100dvh;min-height:100vh;overflow:visible}
  #body{overflow:visible;flex-direction:column}

  /* Sidebar goes horizontal across the top on mobile */
  #sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid #1e1e2e;flex-direction:row;flex-wrap:wrap;align-items:center;padding:4px 8px;gap:6px}
  #sidebar-header{display:none}
  .side-btn{margin:0;font-size:9px;padding:5px 10px}
  #layers-lbl{display:none}
  #layers-list{display:flex;flex-direction:row;overflow-x:auto;flex:1;padding:2px 0;gap:4px;-webkit-overflow-scrolling:touch}
  .layer-item{flex-shrink:0;padding:3px 5px;margin:0}
  .layer-label{display:none}
  .layer-vis,.layer-del{font-size:10px}
  .hero-badge{display:none}

  /* Nav */
  #nav-logo span{font-size:11px}
  #nav-lparmy{font-size:9px;padding:3px 6px}
  #topnav{padding:0 8px;gap:7px;height:36px}

  /* Toolbar scrolls horizontally */
  #toolbar{padding:4px 5px;gap:2px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tb-btn{font-size:9px;padding:2px 5px;height:18px;flex-shrink:0}
  .tb-label{font-size:9px;flex-shrink:0}
  #tb-opacity{width:36px;flex-shrink:0}
  #tb-blend{font-size:9px;height:18px;flex-shrink:0}
  #txt-bar{padding:2px 5px;gap:2px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .txt-select{font-size:8px;height:16px;flex-shrink:0}
  .txt-btn{font-size:9px;height:16px;padding:1px 4px;flex-shrink:0}

  /* Canvas fills width */
  #main{overflow:visible;min-width:0}
  #canvas-wrap{overflow:auto;min-height:240px;-webkit-overflow-scrolling:touch}

  /* Bottom bar: tools row scrollable + save button full-width */
  #bottom-bar{padding:8px;gap:6px}
  .bb-row{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;gap:5px}
  .bb-lbl{font-size:9px;flex-shrink:0}
  #bg-color{flex-shrink:0}
  #bg-pattern,#fmt-sel,#res-sel,#quality-sel{font-size:9px;height:20px;flex-shrink:0}
  #bg-img-btn{font-size:9px;height:20px;flex-shrink:0}
  /* Save button — full-width, tall, easy to tap */
  #bb-row-save{width:100%}
  #save-btn{width:100%;font-size:14px;padding:12px 0;text-align:center;border-radius:8px;border:2px solid #ff6b2b;background:#1e0d05;color:#ff6b2b;font-weight:700;cursor:pointer;letter-spacing:.3px}
  #save-btn:active{background:#ff6b2b;color:#fff}

  #sig-modal{width:92vw;padding:12px}
}
</style>
</head>

<script>
const FONTS=['Dancing Script','Pacifico','Lobster','Caveat','Satisfy','Great Vibes','Shadows Into Light','Cookie','Sacramento','Kaushan Script','Permanent Marker','Amatic SC','Gloria Hallelujah','Special Elite','Indie Flower','Homemade Apple','Allura','Alex Brush','Pinyon Script','Tangerine','Yellowtail','Parisienne','Niconne','Norican','Vibur','WindSong','Waterfall','Roboto','Open Sans','Montserrat','Oswald','Raleway','Nunito','Poppins','Work Sans','Bebas Neue','Anton','Russo One','Orbitron','Playfair Display','Lora','Cormorant Garamond','Cinzel','Merriweather','EB Garamond','Abril Fatface','Josefin Sans','Comfortaa','Exo 2','Rajdhani','Teko'];
const fontSel=document.getElementById('txt-font');
FONTS.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;fontSel.appendChild(o);});

const canvas=document.getElementById('canvas');
const layersList=document.getElementById('layers-list');
const heroRing=document.getElementById('hero-ring');
const emptyHint=document.getElementById('empty-hint');
const opSl=document.getElementById('tb-opacity');
const opVal=document.getElementById('tb-opval');
const blendSel=document.getElementById('tb-blend');
const bgColorEl=document.getElementById('bg-color');
const bgPatEl=document.getElementById('bg-pattern');
const btnUndo=document.getElementById('btn-undo');
const btnRedo=document.getElementById('btn-redo');
const histInd=document.getElementById('history-ind');
const txtBar=document.getElementById('txt-bar');
const CW=480,CH=360;
heroRing.style.cssText+=`left:${CW/2-80}px;top:${CH/2-80}px;width:160px;height:160px`;

let nodes=[],selectedId=null,heroId=null,nextId=1;
let history=[],histIdx=-1,_sup=false,ratioLocked=true;

function gcd(a,b){return b===0?a:gcd(b,a%b);}
function simpRatio(w,h){w=Math.round(w);h=Math.round(h);const g=gcd(w,h),rw=w/g,rh=h/g;return(rw>24||rh>24)?(w/h).toFixed(2)+':1':rw+':'+rh;}
document.getElementById('sz-lock').onclick=()=>{ratioLocked=!ratioLocked;document.getElementById('sz-lock').classList.toggle('on',ratioLocked);};

function getNode(id){return nodes.find(n=>n.id===id);}
function getEl(id){return document.querySelector('[data-nid="'+id+'"]');}

function updateInspector(){
  const n=getNode(selectedId);
  const isImg=n&&n.type==='img';
  document.getElementById('sz-empty').style.display=isImg?'none':'';
  document.getElementById('sz-ctl').style.display=isImg?'flex':'none';
  if(isImg){document.getElementById('sz-w').value=Math.round(n.w);document.getElementById('sz-h').value=Math.round(n.h);document.getElementById('sz-ratio').textContent=simpRatio(n.w,n.h);document.getElementById('sz-nat').textContent=n.natW?n.natW+'x'+n.natH:'';}
  const isTxt=n&&n.type==='text';
  txtBar.classList.toggle('show',isTxt);
  if(isTxt){
    fontSel.value=n.fontFamily||'Dancing Script';
    document.getElementById('txt-size').value=n.fontSize||20;
    document.getElementById('txt-color').value=n.color||'#000000';
    document.getElementById('txt-bold').classList.toggle('on',!!n.bold);
    document.getElementById('txt-italic').classList.toggle('on',!!n.italic);
    document.getElementById('txt-under').classList.toggle('on',!!n.underline);
    document.getElementById('txt-strike').classList.toggle('on',!!n.strike);
    document.getElementById('txt-bg').value=n.textBg||'transparent';
    ['txt-al','txt-ac','txt-ar'].forEach((id,i)=>document.getElementById(id).classList.toggle('on',n.align===(['left','center','right'][i])));
  }
}

document.getElementById('sz-w').oninput=()=>{const n=getNode(selectedId);if(!n||n.type!=='img')return;const nw=Math.max(10,parseInt(document.getElementById('sz-w').value)||10);if(ratioLocked)n.h=Math.round(nw*(n.h/n.w));n.w=nw;document.getElementById('sz-h').value=Math.round(n.h);applyNodeStyle(getEl(n.id),n);updateSzTag(n);updateInspector();};
document.getElementById('sz-w').onchange=()=>snap();
document.getElementById('sz-h').oninput=()=>{const n=getNode(selectedId);if(!n||n.type!=='img')return;const nh=Math.max(10,parseInt(document.getElementById('sz-h').value)||10);if(ratioLocked)n.w=Math.round(nh*(n.w/n.h));n.h=nh;document.getElementById('sz-w').value=Math.round(n.w);applyNodeStyle(getEl(n.id),n);updateSzTag(n);updateInspector();};
document.getElementById('sz-h').onchange=()=>snap();
function updateSzTag(n){const el=getEl(n.id);if(!el)return;const t=el.querySelector('.size-tag');if(t)t.textContent=Math.round(n.w)+'x'+Math.round(n.h);}

function snap(){if(_sup)return;const s=JSON.stringify({nodes:nodes.map(n=>({...n})),selectedId,heroId,bg:bgColorEl.value,pat:bgPatEl.value});history=history.slice(0,histIdx+1);history.push(s);if(history.length>80)history.shift();histIdx=history.length-1;updateHist();}
function updateHist(){btnUndo.disabled=histIdx<=0;btnRedo.disabled=histIdx>=history.length-1;histInd.textContent=histIdx+'/'+(history.length-1);}
function restoreSnap(s){_sup=true;const st=JSON.parse(s);nodes=st.nodes;selectedId=st.selectedId;heroId=st.heroId;bgColorEl.value=st.bg||'#ffffff';bgPatEl.value=st.pat||'none';applyBg();rebuildCanvas();_sup=false;}
function rebuildCanvas(){document.querySelectorAll('.c-node').forEach(e=>e.remove());nodes.forEach(n=>buildEl(n));if(selectedId){const el=getEl(selectedId);if(el){el.classList.add('selected');if(getNode(selectedId)?.type==='text')el.classList.add('txt-selected');}const n=getNode(selectedId);if(n&&n.type==='img'){opSl.value=Math.round(n.opacity*100);opVal.textContent=Math.round(n.opacity*100)+'%';blendSel.value=n.blend||'normal';}}emptyHint.style.display=nodes.length?'none':'';updateInspector();renderLayers();}

// ── GRID SYSTEM ──
let gridOn=false;
const gridOverlay=document.getElementById('grid-overlay');
const gridBtn=document.getElementById('grid-btn');
const gridSizeSel=document.getElementById('grid-size');

function drawGrid(){
  gridOverlay.innerHTML='';
  if(!gridOn)return;
  const step=parseInt(gridSizeSel.value)||30;
  // horizontal lines
  for(let y=step;y<CH;y+=step){
    const line=document.createElement('div');line.className='grid-line-h';line.style.top=y+'px';
    const lbl=document.createElement('div');lbl.className='grid-label-h';lbl.style.top=(y-8)+'px';lbl.textContent=y+'px';
    gridOverlay.appendChild(line);gridOverlay.appendChild(lbl);
  }
  // vertical lines
  for(let x=step;x<CW;x+=step){
    const line=document.createElement('div');line.className='grid-line-v';line.style.left=x+'px';
    const lbl=document.createElement('div');lbl.className='grid-label-v';lbl.style.left=x+'px';lbl.textContent=x+'px';
    gridOverlay.appendChild(line);gridOverlay.appendChild(lbl);
  }
  // center crosshairs (stronger)
  const ch=document.createElement('div');ch.className='grid-line-h';ch.style.top=(CH/2)+'px';ch.style.background='rgba(255,107,43,0.3)';ch.style.height='1px';gridOverlay.appendChild(ch);
  const cv=document.createElement('div');cv.className='grid-line-v';cv.style.left=(CW/2)+'px';cv.style.background='rgba(255,107,43,0.3)';cv.style.width='1px';gridOverlay.appendChild(cv);
}

gridBtn.onclick=()=>{gridOn=!gridOn;gridBtn.classList.toggle('on',gridOn);drawGrid();};
gridSizeSel.onchange=()=>{if(gridOn)drawGrid();};

// ── SNAP-TO-GRID helper ──
const SNAP_THRESH=8;
function snapToGrid(val,step){
  const snapped=Math.round(val/step)*step;
  return Math.abs(val-snapped)<SNAP_THRESH?snapped:val;
}

// ── ALIGNMENT SNAP GUIDES ──
function showSnapLines(n){
  clearSnapLines();
  if(!gridOn)return;
  const step=parseInt(gridSizeSel.value)||30;
  // Check edges and center of dragged node
  const edges={x:[n.x, n.x+n.w/2, n.x+n.w], y:[n.y, n.y+n.h/2, n.y+n.h]};
  // Check against other nodes
  const others=nodes.filter(o=>o.id!==n.id&&o.visible!==false);
  const vSnaps=new Set(), hSnaps=new Set();

  others.forEach(o=>{
    const oe={x:[o.x, o.x+o.w/2, o.x+o.w], y:[o.y, o.y+o.h/2, o.y+o.h]};
    edges.x.forEach(ex=>oe.x.forEach(ox=>{if(Math.abs(ex-ox)<SNAP_THRESH)vSnaps.add(Math.round(ox));}));
    edges.y.forEach(ey=>oe.y.forEach(oy=>{if(Math.abs(ey-oy)<SNAP_THRESH)hSnaps.add(Math.round(oy));}));
  });

  // Also snap to grid lines
  edges.x.forEach(ex=>{const sg=snapToGrid(ex,step);if(sg!==ex)vSnaps.add(sg);});
  edges.y.forEach(ey=>{const sg=snapToGrid(ey,step);if(sg!==ey)hSnaps.add(sg);});

  vSnaps.forEach(x=>{const l=document.createElement('div');l.className='snap-line v';l.style.left=x+'px';l.id='sl_v_'+x;canvas.appendChild(l);});
  hSnaps.forEach(y=>{const l=document.createElement('div');l.className='snap-line h';l.style.top=y+'px';l.id='sl_h_'+y;canvas.appendChild(l);});
}
function clearSnapLines(){document.querySelectorAll('.snap-line').forEach(e=>e.remove());}

// Apply snap when dragging (called from setupImgDrag pointermove)
function applySnapPos(n){
  if(!gridOn)return;
  const step=parseInt(gridSizeSel.value)||30;
  // snap left edge / center / right edge to grid
  const sx=snapToGrid(n.x,step);
  const scx=snapToGrid(n.x+n.w/2,step)-n.w/2;
  const srx=snapToGrid(n.x+n.w,step)-n.w;
  const sy=snapToGrid(n.y,step);
  const scy=snapToGrid(n.y+n.h/2,step)-n.h/2;
  const sry=snapToGrid(n.y+n.h,step)-n.h;
  const bestX=[sx,scx,srx].reduce((a,b)=>Math.abs(a-n.x)<Math.abs(b-n.x)?a:b);
  const bestY=[sy,scy,sry].reduce((a,b)=>Math.abs(a-n.y)<Math.abs(b-n.y)?a:b);
  if(Math.abs(bestX-n.x)<SNAP_THRESH)n.x=Math.round(bestX);
  if(Math.abs(bestY-n.y)<SNAP_THRESH)n.y=Math.round(bestY);
  // snap to other nodes
  const others=nodes.filter(o=>o.id!==n.id&&o.visible!==false);
  others.forEach(o=>{
    const oe={x:[o.x,o.x+o.w/2,o.x+o.w],y:[o.y,o.y+o.h/2,o.y+o.h]};
    [n.x,n.x+n.w/2,n.x+n.w].forEach((ex,ei)=>{oe.x.forEach(ox=>{if(Math.abs(ex-ox)<SNAP_THRESH){if(ei===0)n.x=Math.round(ox);else if(ei===1)n.x=Math.round(ox-n.w/2);else n.x=Math.round(ox-n.w);}});});
    [n.y,n.y+n.h/2,n.y+n.h].forEach((ey,ei)=>{oe.y.forEach(oy=>{if(Math.abs(ey-oy)<SNAP_THRESH){if(ei===0)n.y=Math.round(oy);else if(ei===1)n.y=Math.round(oy-n.h/2);else n.y=Math.round(oy-n.h);}});});
  });
  showSnapLines(n);
}

btnUndo.onclick=()=>{if(histIdx<=0)return;histIdx--;restoreSnap(history[histIdx]);updateHist();};
btnRedo.onclick=()=>{if(histIdx>=history.length-1)return;histIdx++;restoreSnap(history[histIdx]);updateHist();};
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();btnUndo.click();}if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();btnRedo.click();}});

function renderLayers(){layersList.innerHTML='';[...nodes].reverse().forEach(n=>{const d=document.createElement('div');d.className='layer-item'+(n.id===selectedId?' selected':'')+(n.id===heroId?' hero-layer':'');d.dataset.id=n.id;let th='';if(n.type==='text')th='<div class="layer-txt-thumb">T</div>';else if(n.type==='sig')th='<div class="layer-sig-thumb">&#9998;</div>';else th='<img class="layer-thumb" src="'+n.src+'">';d.innerHTML=th+'<span class="layer-label">'+(n.name||'layer')+'</span>'+(n.id===heroId?'<span class="hero-badge">H</span>':'')+'<span class="layer-vis">'+(n.visible!==false?'●':'○')+'</span><span class="layer-del">✕</span>';d.querySelector('.layer-vis').onclick=e=>{e.stopPropagation();toggleVis(n.id);};d.querySelector('.layer-del').onclick=e=>{e.stopPropagation();deleteNode(n.id);};d.onclick=()=>selectNode(n.id);layersList.appendChild(d);});}

function applyNodeStyle(el,n){
  el.style.left=n.x+'px';el.style.top=n.y+'px';
  el.style.width=n.w+'px';el.style.height=n.h+'px';
  el.style.transform='rotate('+(n.rot||0)+'deg)';
  el.style.opacity=n.opacity||1;
  el.style.mixBlendMode=n.blend||'normal';
  el.style.display=n.visible!==false?'block':'none';
  el.style.zIndex=nodes.indexOf(n)+2;
  if(n.type==='img'||n.type==='sig'){const img=el.querySelector('.node-frame img');if(img)img.style.transform='scale('+(n.flipH?-1:1)+','+(n.flipV?-1:1)+')';}
  if(n.type==='text')syncTxtDisplay(el,n);
}

function syncTxtDisplay(el,n){
  const disp=el.querySelector('.txt-display');
  const ed=el.querySelector('.txt-editor');
  if(!disp||!ed)return;
  const css='font-family:"'+(n.fontFamily||'Dancing Script')+'",cursive,sans-serif;font-size:'+(n.fontSize||20)+'px;color:'+(n.color||'#000')+';font-weight:'+(n.bold?'bold':'normal')+';font-style:'+(n.italic?'italic':'normal')+';text-decoration:'+(n.underline&&n.strike?'underline line-through':n.underline?'underline':n.strike?'line-through':'none')+';text-align:'+(n.align||'center')+';background:'+(n.textBg||'transparent')+';';
  disp.style.cssText='position:absolute;inset:0;overflow:hidden;padding:3px;word-break:break-word;pointer-events:none;white-space:pre-wrap;'+css;
  disp.textContent=n.text||'';
  const isActive=ed.classList.contains('active');
  ed.style.cssText='position:absolute;inset:0;resize:none;border:none;outline:none;overflow:hidden;padding:3px;word-break:break-word;white-space:pre-wrap;z-index:5;'+css+(isActive?'opacity:1;pointer-events:auto;cursor:text;':'opacity:0;pointer-events:none;');
}

function buildEl(n){
  const d=document.createElement('div');
  d.className='c-node';d.setAttribute('data-nid',n.id);
  d.style.position='absolute';
  if(n.type==='img'||n.type==='sig'){
    d.innerHTML='<div class="node-frame"><img src="'+n.src+'" draggable="false"><div class="handle nw"></div><div class="handle ne"></div><div class="handle sw"></div><div class="handle se"></div><div class="rot-handle img-rot"></div></div><div class="size-tag"></div>';
    applyNodeStyle(d,n);updateSzTag(n);setupImgDrag(d,n);
  }else{
    d.innerHTML='<div class="node-frame"><div class="txt-display"></div><textarea class="txt-editor" spellcheck="false"></textarea><div class="handle txt-se"></div><div class="rot-handle txt-rot"></div></div>';
    applyNodeStyle(d,n);
    const ed=d.querySelector('.txt-editor');
    ed.value=n.text||'';
    ed.addEventListener('input',()=>{n.text=ed.value;syncTxtDisplay(d,n);});
    ed.addEventListener('blur',()=>{ed.classList.remove('active');syncTxtDisplay(d,n);snap();});
    d.addEventListener('dblclick',e=>{if(e.target.classList.contains('handle')||e.target.classList.contains('rot-handle'))return;ed.classList.add('active');syncTxtDisplay(d,n);ed.focus();e.stopPropagation();});
    setupTxtDrag(d,n);
  }
  canvas.appendChild(d);
}

function setupImgDrag(el,n){
  let mode=null,sx,sy,ox,oy,ow,oh,moved=false;
  el.addEventListener('pointerdown',e=>{
    const t=e.target;
    if(t.classList.contains('img-rot'))mode='rot';
    else if(t.classList.contains('nw'))mode='nw';
    else if(t.classList.contains('ne'))mode='ne';
    else if(t.classList.contains('sw'))mode='sw';
    else if(t.classList.contains('se'))mode='se';
    else mode='drag';
    selectNode(n.id);sx=e.clientX;sy=e.clientY;ox=n.x;oy=n.y;ow=n.w;oh=n.h;moved=false;
    el.setPointerCapture(e.pointerId);e.stopPropagation();e.preventDefault();
  });
  el.addEventListener('pointermove',e=>{
    if(!mode)return;const dx=e.clientX-sx,dy=e.clientY-sy;moved=true;
    if(mode==='drag'){n.x=ox+dx;n.y=oy+dy;applySnapPos(n);}
    else if(mode==='rot'){const r=el.getBoundingClientRect();n.rot=Math.round(Math.atan2(e.clientY-(r.top+r.height/2),e.clientX-(r.left+r.width/2))*180/Math.PI+90);}
    else{const ratio=ow/oh;let nw=ow,nh=oh,nx=ox,ny=oy;
      if(mode==='se'){nw=Math.max(20,ow+dx);nh=Math.max(20,oh+dy);if(ratioLocked){const d2=Math.max(dx,dy);nw=Math.max(20,ow+d2);nh=nw/ratio;}}
      else if(mode==='sw'){nw=Math.max(20,ow-dx);if(ratioLocked){nh=nw/ratio;nx=ox+ow-nw;}else{nh=Math.max(20,oh+dy);nx=ox+ow-nw;}}
      else if(mode==='ne'){nw=Math.max(20,ow+dx);if(ratioLocked){nh=nw/ratio;ny=oy+oh-nh;}else{nh=Math.max(20,oh-dy);ny=oy+oh-nh;}}
      else if(mode==='nw'){nw=Math.max(20,ow-dx);if(ratioLocked){nh=nw/ratio;nx=ox+ow-nw;ny=oy+oh-nh;}else{nh=Math.max(20,oh-dy);nx=ox+ow-nw;ny=oy+oh-nh;}}
      n.w=Math.round(nw);n.h=Math.round(nh);n.x=Math.round(nx);n.y=Math.round(ny);}
    applyNodeStyle(el,n);updateSzTag(n);updateInspector();e.preventDefault();
  });
  el.addEventListener('pointerup',()=>{clearSnapLines();if(moved)snap();mode=null;moved=false;});
}

function setupTxtDrag(el,n){
  let mode=null,sx,sy,ox,oy,ow,oh,moved=false;
  el.addEventListener('pointerdown',e=>{
    const t=e.target;
    if(t.classList.contains('txt-editor')&&t.classList.contains('active'))return;
    if(t.classList.contains('txt-rot'))mode='rot';
    else if(t.classList.contains('txt-se'))mode='resize';
    else mode='drag';
    selectNode(n.id);sx=e.clientX;sy=e.clientY;ox=n.x;oy=n.y;ow=n.w;oh=n.h;moved=false;
    el.setPointerCapture(e.pointerId);e.stopPropagation();e.preventDefault();
  });
  el.addEventListener('pointermove',e=>{
    if(!mode)return;const dx=e.clientX-sx,dy=e.clientY-sy;moved=true;
    if(mode==='drag'){n.x=ox+dx;n.y=oy+dy;applySnapPos(n);}
    else if(mode==='resize'){n.w=Math.max(30,ow+dx);n.h=Math.max(16,oh+dy);}
    else if(mode==='rot'){const r=el.getBoundingClientRect();n.rot=Math.round(Math.atan2(e.clientY-(r.top+r.height/2),e.clientX-(r.left+r.width/2))*180/Math.PI+90);}
    applyNodeStyle(el,n);e.preventDefault();
  });
  el.addEventListener('pointerup',()=>{clearSnapLines();if(moved)snap();mode=null;moved=false;});
}

function selectNode(id){
  selectedId=id;
  document.querySelectorAll('.c-node').forEach(el=>{el.classList.remove('selected','txt-selected');});
  const el=getEl(id);
  if(el){el.classList.add('selected');if(getNode(id)?.type==='text')el.classList.add('txt-selected');}
  const n=getNode(id);
  if(n&&n.type==='img'){opSl.value=Math.round(n.opacity*100);opVal.textContent=Math.round(n.opacity*100)+'%';blendSel.value=n.blend||'normal';}
  updateInspector();renderLayers();
}

function addImage(src,name){const img=new Image();img.onload=()=>{const nw=img.naturalWidth,nh=img.naturalHeight;const w=Math.min(Math.round(CW*0.34),nw),h=Math.round(nh*(w/nw));const id=nextId++;nodes.push({id,type:'img',src,name,x:Math.round(CW/2-w/2),y:Math.round(CH/2-h/2),w,h,rot:0,opacity:1,blend:'normal',visible:true,flipH:false,flipV:false,natW:nw,natH:nh});buildEl(nodes[nodes.length-1]);selectNode(id);emptyHint.style.display='none';snap();};img.src=src;}

function addText(){const id=nextId++;const n={id,type:'text',name:'Text',x:Math.round(CW/2-80),y:Math.round(CH/2-22),w:160,h:44,rot:0,text:'Your text here',fontFamily:'Dancing Script',fontSize:20,color:'#000000',bold:false,italic:false,underline:false,strike:false,align:'center',textBg:'transparent',visible:true,opacity:1,blend:'normal'};nodes.push(n);buildEl(n);selectNode(id);emptyHint.style.display='none';snap();}

function toggleVis(id){const n=getNode(id);if(!n)return;n.visible=!n.visible;const el=getEl(id);if(el)applyNodeStyle(el,n);snap();renderLayers();}
function deleteNode(id){const el=getEl(id);if(el)el.remove();nodes=nodes.filter(n=>n.id!==id);if(heroId===id)heroId=null;if(selectedId===id){selectedId=null;updateInspector();}if(nodes.length===0)emptyHint.style.display='';snap();renderLayers();}

opSl.oninput=()=>{opVal.textContent=opSl.value+'%';const n=getNode(selectedId);if(!n)return;n.opacity=opSl.value/100;applyNodeStyle(getEl(n.id),n);};
opSl.onchange=()=>snap();
blendSel.onchange=()=>{const n=getNode(selectedId);if(!n)return;n.blend=blendSel.value;applyNodeStyle(getEl(n.id),n);snap();};

function txtProp(prop,val){const n=getNode(selectedId);if(!n||n.type!=='text')return;n[prop]=val;syncTxtDisplay(getEl(n.id),n);snap();}
fontSel.onchange=()=>txtProp('fontFamily',fontSel.value);
document.getElementById('txt-size').onchange=e=>txtProp('fontSize',parseInt(e.target.value));
document.getElementById('txt-color').oninput=e=>txtProp('color',e.target.value);
['bold','italic'].forEach(p=>document.getElementById('txt-'+p).onclick=()=>{const n=getNode(selectedId);if(!n||n.type!=='text')return;n[p]=!n[p];syncTxtDisplay(getEl(n.id),n);updateInspector();snap();});
document.getElementById('txt-under').onclick=()=>{const n=getNode(selectedId);if(!n||n.type!=='text')return;n.underline=!n.underline;syncTxtDisplay(getEl(n.id),n);updateInspector();snap();};
document.getElementById('txt-strike').onclick=()=>{const n=getNode(selectedId);if(!n||n.type!=='text')return;n.strike=!n.strike;syncTxtDisplay(getEl(n.id),n);updateInspector();snap();};
['txt-al','txt-ac','txt-ar'].forEach((id,i)=>document.getElementById(id).onclick=()=>{txtProp('align',['left','center','right'][i]);updateInspector();});
document.getElementById('txt-bg').onchange=e=>txtProp('textBg',e.target.value);
document.getElementById('btn-add-text').onclick=addText;

document.getElementById('btn-hero').onclick=()=>{if(!selectedId)return;heroId=selectedId;const n=getNode(heroId);if(!n||n.type!=='img')return;n.x=Math.round(parseInt(heroRing.style.left));n.y=Math.round(parseInt(heroRing.style.top));n.w=Math.round(parseInt(heroRing.style.width));n.h=Math.round(parseInt(heroRing.style.height));applyNodeStyle(getEl(n.id),n);updateSzTag(n);updateInspector();snap();renderLayers();};
document.getElementById('btn-front').onclick=()=>{if(!selectedId)return;const i=nodes.findIndex(n=>n.id===selectedId);if(i<nodes.length-1){[nodes[i],nodes[i+1]]=[nodes[i+1],nodes[i]];}nodes.forEach((n,idx)=>{const el=getEl(n.id);if(el)el.style.zIndex=idx+2;});snap();renderLayers();};
document.getElementById('btn-back').onclick=()=>{if(!selectedId)return;const i=nodes.findIndex(n=>n.id===selectedId);if(i>0){[nodes[i],nodes[i-1]]=[nodes[i-1],nodes[i]];}nodes.forEach((n,idx)=>{const el=getEl(n.id);if(el)el.style.zIndex=idx+2;});snap();renderLayers();};
document.getElementById('btn-fh').onclick=()=>{const n=getNode(selectedId);if(!n||n.type!=='img')return;n.flipH=!n.flipH;applyNodeStyle(getEl(n.id),n);snap();};
document.getElementById('btn-fv').onclick=()=>{const n=getNode(selectedId);if(!n||n.type!=='img')return;n.flipV=!n.flipV;applyNodeStyle(getEl(n.id),n);snap();};
document.getElementById('btn-del').onclick=()=>{if(selectedId)deleteNode(selectedId);};

function applyBg(){const c=bgColorEl.value,p=bgPatEl.value;let bg=c;if(p==='dots')bg='radial-gradient(circle,#0004 1px,transparent 1px) 0 0/18px 18px,'+c;else if(p==='grid')bg='linear-gradient('+c+'44 1px,transparent 1px) 0 0/20px 20px,linear-gradient(90deg,'+c+'44 1px,transparent 1px) 0 0/20px 20px,'+c;else if(p==='diagonal')bg='repeating-linear-gradient(45deg,#0002 0,#0002 1px,transparent 1px,transparent 10px),'+c;else if(p==='checker'){const h=c.replace('#','');const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);const dd='rgba('+Math.max(0,r-30)+','+Math.max(0,g-30)+','+Math.max(0,b-30)+',1)';bg='repeating-conic-gradient('+c+' 0 25%,'+dd+' 0 50%) 0 0/20px 20px';}canvas.style.background=bg;}
bgColorEl.oninput=()=>{canvas._bgImg=false;applyBg();};bgColorEl.onchange=()=>snap();
bgPatEl.onchange=()=>{canvas._bgImg=false;applyBg();snap();};
document.getElementById('bg-img-input').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{canvas.style.background='none';canvas.style.backgroundImage='url('+ev.target.result+')';canvas.style.backgroundSize='cover';canvas.style.backgroundPosition='center';canvas._bgImg=true;snap();};r.readAsDataURL(f);e.target.value='';};

document.getElementById('file-input').onchange=e=>{[...e.target.files].forEach(f=>{const r=new FileReader();r.onload=ev=>addImage(ev.target.result,f.name.replace(/\.[^.]+$/,'').slice(0,14));r.readAsDataURL(f);});e.target.value='';};
canvas.addEventListener('dragover',e=>e.preventDefault());
canvas.addEventListener('drop',e=>{e.preventDefault();[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')).forEach(f=>{const r=new FileReader();r.onload=ev=>addImage(ev.target.result,f.name.replace(/\.[^.]+$/,'').slice(0,14));r.readAsDataURL(f);});});

document.getElementById('save-btn').onclick=async()=>{
  const fmt=document.getElementById('fmt-sel').value;
  const res=parseInt(document.getElementById('res-sel').value);
  const quality=parseFloat(document.getElementById('quality-sel').value);
  const outW=CW*res, outH=CH*res;

  heroRing.style.display='none';
  gridOverlay.style.display='none';
  document.querySelectorAll('.c-node').forEach(el=>{el.classList.remove('selected','txt-selected');});
  document.querySelectorAll('.handle,.rot-handle,.size-tag').forEach(el=>el.style.display='none');
  document.querySelectorAll('.txt-editor').forEach(el=>{el.style.opacity='0';el.classList.remove('active');});
  document.querySelectorAll('.snap-line').forEach(el=>el.remove());

  try{
    const c2=await html2canvas(canvas,{
      scale:res,
      useCORS:true,
      allowTaint:true,
      backgroundColor:null,
      logging:false,
      imageTimeout:0,
    });

    // Apply extra sharpening pass via offscreen canvas with high-quality resampling
    const sharp=document.createElement('canvas');
    sharp.width=outW;sharp.height=outH;
    const sctx=sharp.getContext('2d');
    sctx.imageSmoothingEnabled=true;
    sctx.imageSmoothingQuality='high';
    sctx.drawImage(c2,0,0,outW,outH);

    const mimeType=fmt==='jpeg'?'image/jpeg':fmt==='webp'?'image/webp':'image/png';
    const dataUrl=fmt==='png'?sharp.toDataURL('image/png'):sharp.toDataURL(mimeType,quality);
    const a=document.createElement('a');
    a.href=dataUrl;
    a.download='mycard_'+outW+'x'+outH+(fmt==='jpeg'?'.jpg':'.'+fmt);
    a.click();
  }
  catch(err){alert('Export failed — try a lower resolution or JPG format.');}
  finally{
    heroRing.style.display='flex';
    gridOverlay.style.display='';
    document.querySelectorAll('.handle,.rot-handle').forEach(el=>el.style.display='');
    document.querySelectorAll('.size-tag').forEach(el=>el.style.display='');
    if(selectedId){const el=getEl(selectedId);if(el){el.classList.add('selected');if(getNode(selectedId)?.type==='text')el.classList.add('txt-selected');}}
  }
};

const sigWrap=document.getElementById('sig-modal-wrap');
const sigCv=document.getElementById('sig-canvas');
const sigCtx=sigCv.getContext('2d');
let sigDrawing=false,sigLast=null;
function openSig(){sigWrap.classList.add('open');sigCtx.clearRect(0,0,sigCv.width,sigCv.height);}
document.getElementById('sig-cancel').onclick=()=>sigWrap.classList.remove('open');
document.getElementById('sig-clear').onclick=()=>sigCtx.clearRect(0,0,sigCv.width,sigCv.height);
function getSigPos(e){const r=sigCv.getBoundingClientRect();const scaleX=sigCv.width/r.width;const scaleY=sigCv.height/r.height;if(e.touches)return{x:(e.touches[0].clientX-r.left)*scaleX,y:(e.touches[0].clientY-r.top)*scaleY};return{x:(e.clientX-r.left)*scaleX,y:(e.clientY-r.top)*scaleY};}
function sigDraw(pos){sigCtx.beginPath();sigCtx.moveTo(sigLast.x,sigLast.y);sigCtx.lineTo(pos.x,pos.y);sigCtx.strokeStyle=document.getElementById('sig-color').value;sigCtx.lineWidth=parseInt(document.getElementById('sig-size').value);sigCtx.lineCap='round';sigCtx.lineJoin='round';sigCtx.stroke();sigLast=pos;}
sigCv.addEventListener('mousedown',e=>{sigDrawing=true;sigLast=getSigPos(e);});
sigCv.addEventListener('mousemove',e=>{if(sigDrawing)sigDraw(getSigPos(e));});
sigCv.addEventListener('mouseup',()=>sigDrawing=false);
sigCv.addEventListener('mouseleave',()=>sigDrawing=false);
sigCv.addEventListener('touchstart',e=>{e.preventDefault();sigDrawing=true;sigLast=getSigPos(e);},{passive:false});
sigCv.addEventListener('touchmove',e=>{e.preventDefault();if(sigDrawing)sigDraw(getSigPos(e));},{passive:false});
sigCv.addEventListener('touchend',()=>sigDrawing=false);
document.getElementById('sig-add').onclick=()=>{
  const src=sigCv.toDataURL('image/png');const id=nextId++;const sw=140,sh=60;
  nodes.push({id,type:'sig',name:'Signature',src,x:Math.round(CW/2-sw/2),y:Math.round(CH-sh-20),w:sw,h:sh,rot:0,opacity:1,blend:'normal',visible:true,flipH:false,flipV:false});
  buildEl(nodes[nodes.length-1]);selectNode(id);emptyHint.style.display='none';snap();sigWrap.classList.remove('open');
};
snap();
</script>
</body>
